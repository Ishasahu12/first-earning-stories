<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Read Stories - First Earning Stories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #2B2B2B;
      --text: #FFFFFF;
      --accent: #FFF378;
      --text-muted: #A1A1AA;
      --border: #3A3A3A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* Ambient grain texture */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      z-index: 0;
    }

    /* Reading progress bar */
    .reading-progress {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 2px;
      background: var(--accent);
      opacity: 0.3;
      z-index: 500;
      transition: width 100ms ease;
    }

    /* Custom cursor */
    .cursor-dot {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px var(--accent), 0 0 24px rgba(255,243,120,0.3);
      opacity: 0;
      transition: opacity 200ms ease;
    }

    body:hover .cursor-dot {
      opacity: 1;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 1.25rem 2rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      z-index: 100;
      background: linear-gradient(180deg, var(--bg) 60%, transparent 100%);
    }

    .nav-links {
      display: flex;
      gap: 1.75rem;
      align-items: center;
    }

    .nav-link {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
    }

    .nav-link:hover, .nav-link.active {
      color: var(--text);
    }

    /* Your entry dropdown */
    .your-entry {
      position: relative;
    }

    .entry-toggle {
      font-size: 0.9rem;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      transition: color 0.2s;
    }

    .entry-toggle:hover {
      color: var(--text);
    }

    .entry-dropdown {
      position: absolute;
      top: calc(100% + 0.75rem);
      right: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 1.5rem;
      min-width: 260px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px);
      transition: all 200ms ease;
      z-index: 200;
    }

    .your-entry.open .entry-dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .entry-dropdown .entry-heading {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
    }

    .entry-dropdown .entry-line {
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 0.6rem;
      line-height: 1.5;
    }

    .entry-dropdown .entry-accent {
      color: var(--accent);
      font-weight: 500;
    }

    .entry-dropdown .entry-subtle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.75rem;
      font-style: italic;
    }

    /* Main */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 5rem 1.5rem 4rem;
      max-width: 680px;
      margin: 0 auto;
      transition: opacity 350ms ease;
    }

    .page.dimmed {
      opacity: 0.15;
      pointer-events: none;
    }

    /* Vignette edges */
    .page::before,
    .page::after {
      content: '';
      position: fixed;
      top: 0;
      bottom: 0;
      width: 80px;
      pointer-events: none;
      z-index: 2;
    }

    .page::before {
      left: 0;
      background: linear-gradient(to right, var(--bg) 0%, transparent 100%);
    }

    .page::after {
      right: 0;
      background: linear-gradient(to left, var(--bg) 0%, transparent 100%);
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 500;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    .hero p {
      font-size: 1rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Filter Chips */
    .filter-scroll {
      display: flex;
      gap: 0.6rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      margin-bottom: 3rem;
      -ms-overflow-style: none;
      scrollbar-width: none;
      justify-content: center;
      flex-wrap: wrap;
    }

    .filter-scroll::-webkit-scrollbar {
      display: none;
    }

    .filter-chip {
      flex-shrink: 0;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 0.85rem;
      color: var(--text-muted);
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      cursor: pointer;
      transition: all 200ms ease;
      white-space: nowrap;
    }

    .filter-chip:hover {
      border-color: rgba(255,255,255,0.15);
      color: var(--text);
    }

    .filter-chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(255,243,120,0.06);
    }

    /* Stories */
    .stories-feed {
      display: flex;
      flex-direction: column;
      gap: 3.5rem;
    }

    .story-item {
      cursor: pointer;
      transition: all 250ms ease;
      padding: 0.5rem 0;
    }

    .story-item:hover {
      transform: translateY(-2px);
    }

    .story-item:hover .story-text {
      color: rgba(255,255,255,0.92);
    }

    .story-item:hover .story-meta {
      color: rgba(255,255,255,0.65);
    }

    .story-item:hover .read-more {
      color: var(--accent);
      opacity: 1;
    }

    .story-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      line-height: 1.75;
      margin-bottom: 0.75rem;
      letter-spacing: -0.01em;
      transition: color 300ms ease;
    }

    .story-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      transition: color 300ms ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }

    .story-meta .name {
      color: var(--accent);
      font-weight: 500;
    }

    .story-meta .cat {
      opacity: 0.7;
    }

    .view-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.35;
      margin-bottom: 0.4rem;
    }

    .read-more {
      font-size: 0.85rem;
      color: var(--text-muted);
      opacity: 0.4;
      transition: all 200ms ease;
    }

    /* Story Open View - Focus Mode */
    .story-open {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 50;
      background: rgba(43, 43, 43, 0.96);
      backdrop-filter: blur(2px);
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 0;
      overflow-y: auto;
      opacity: 0;
      transition: opacity 300ms ease;
    }

    .story-open.active {
      display: flex;
      opacity: 1;
    }

    .story-open-inner {
      max-width: 640px;
      width: 100%;
      margin: 6rem auto 4rem;
      padding: 0 1.5rem;
      position: relative;
    }

    /* Memory image */
    .memory-image {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 60px rgba(255,243,120,0.05);
      transition: transform 300ms ease;
      cursor: pointer;
    }

    .memory-image:hover {
      transform: scale(1.02);
    }

    .memory-image-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.6;
      margin-top: -1.5rem;
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }

    /* Story content */
    .open-story-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      line-height: 1.85;
      margin-bottom: 2.5rem;
      letter-spacing: -0.01em;
    }

    .open-story-text p {
      margin-bottom: 1.5rem;
    }

    .open-story-text p:last-child {
      margin-bottom: 0;
    }

    /* Author block */
    .author-block {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .author-name {
      font-size: 1rem;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 0.3rem;
    }

    .author-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      opacity: 0.7;
      margin-bottom: 0.5rem;
    }

    .author-views {
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.4;
    }

    /* Navigation links */
    .story-nav {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .story-nav a {
      font-size: 0.9rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.2s;
      text-decoration: none;
    }

    .story-nav a:hover {
      color: var(--accent);
    }

    /* End CTA */
    .end-cta {
      text-align: center;
      margin-top: 5rem;
      padding: 3rem 0;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .end-cta p {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--text);
      margin-bottom: 1.25rem;
    }

    .btn-write {
      display: inline-block;
      background: var(--accent);
      color: var(--bg);
      padding: 14px 40px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: all 200ms ease;
      border: none;
    }

    .btn-write:hover {
      box-shadow: 0 8px 30px rgba(255, 243, 120, 0.25);
      transform: translateY(-2px);
    }

    /* Hide custom cursor on touch devices */
    @media (hover: none) and (pointer: coarse) {
      .cursor-dot {
        display: none !important;
      }
    }

    /* ─── Tablet (<= 1024px) ─── */
    @media (max-width: 1024px) {
      .page {
        padding: 4rem 1.5rem 3rem;
      }
      .hero h1 {
        font-size: 1.85rem;
      }
      .hero p {
        font-size: 1rem;
      }
      .story-text {
        font-size: 1.1rem;
        line-height: 1.75;
      }
      .story-meta {
        font-size: 0.85rem;
      }
      .story-open-inner {
        max-width: 600px;
        margin: 5rem auto 3rem;
        padding: 0 1.5rem;
      }
      .open-story-text {
        font-size: 1.15rem;
        line-height: 1.8;
      }
      .memory-image {
        max-height: 260px;
      }
    }

    /* ─── Mobile Large (<= 768px) ─── */
    @media (max-width: 768px) {
      .header {
        padding: 1rem;
        justify-content: center;
      }
      .nav-links {
        gap: 1.25rem;
      }
      .nav-link,
      .entry-toggle {
        font-size: 0.85rem;
      }
      .entry-dropdown {
        right: 50%;
        transform: translateX(50%) translateY(-8px);
        min-width: 220px;
        padding: 1.25rem;
      }
      .your-entry.open .entry-dropdown {
        transform: translateX(50%) translateY(0);
      }

      .page {
        padding: 4rem 1rem 3rem;
        max-width: 100%;
      }
      .page::before,
      .page::after {
        width: 24px;
      }

      .hero {
        margin-bottom: 2rem;
      }
      .hero h1 {
        font-size: 1.6rem;
      }
      .hero p {
        font-size: 0.9rem;
      }

      .filter-scroll {
        justify-content: flex-start;
        flex-wrap: nowrap;
        overflow-x: auto;
        padding: 0 0.5rem 0.5rem;
        margin-left: -1rem;
        margin-right: -1rem;
        padding-left: 1rem;
        padding-right: 1rem;
        gap: 0.5rem;
      }
      .filter-chip {
        padding: 7px 14px;
        font-size: 0.8rem;
      }

      .stories-feed {
        gap: 2.5rem;
      }
      .story-item {
        padding: 0.4rem 0;
      }
      .story-text {
        font-size: 1.05rem;
        line-height: 1.7;
        margin-bottom: 0.6rem;
      }
      .story-meta {
        font-size: 0.8rem;
      }
      .view-count {
        font-size: 0.7rem;
      }
      .read-more {
        font-size: 0.8rem;
      }

      /* Story overlay */
      .story-open {
        align-items: flex-start;
        padding-top: 0;
      }
      .story-open-inner {
        max-width: 100%;
        margin: 4rem auto 2rem;
        padding: 0 1rem;
      }
      .open-story-text {
        font-size: 1.05rem;
        line-height: 1.75;
        margin-bottom: 2rem;
      }
      .open-story-text p {
        margin-bottom: 1.25rem;
      }
      .memory-image {
        max-height: 220px;
        border-radius: 12px;
        margin-bottom: 1.5rem;
      }
      .author-block {
        margin-top: 2rem;
        padding-top: 1.25rem;
      }
      .author-name {
        font-size: 0.95rem;
      }
      .author-meta {
        font-size: 0.8rem;
      }
      .story-nav {
        flex-direction: column;
        gap: 1rem;
        margin-top: 1.5rem;
        padding-top: 1.25rem;
      }

      .end-cta {
        margin-top: 3.5rem;
        padding: 2rem 0;
      }
      .end-cta p {
        font-size: 1.1rem;
        margin-bottom: 1rem;
      }
      .btn-write {
        padding: 12px 32px;
        font-size: 0.9rem;
      }
    }

    /* ─── Mobile Medium (<= 640px) ─── */
    @media (max-width: 640px) {
      .header {
        padding: 0.85rem;
      }
      .nav-links {
        gap: 1rem;
      }
      .hero h1 {
        font-size: 1.45rem;
      }
      .hero p {
        font-size: 0.88rem;
      }
      .story-text {
        font-size: 1rem;
      }
      .story-meta {
        font-size: 0.78rem;
      }
      .open-story-text {
        font-size: 1rem;
        line-height: 1.72;
      }
      .memory-image {
        max-height: 200px;
        border-radius: 10px;
      }
    }

    /* ─── Mobile Small (<= 480px) ─── */
    @media (max-width: 480px) {
      .header {
        padding: 0.75rem;
      }
      .nav-links {
        gap: 0.85rem;
      }
      .nav-link,
      .entry-toggle {
        font-size: 0.8rem;
      }
      .entry-dropdown {
        min-width: 200px;
        padding: 1rem;
      }

      .page {
        padding: 3.5rem 0.75rem 2.5rem;
      }
      .page::before,
      .page::after {
        width: 16px;
      }

      .hero h1 {
        font-size: 1.35rem;
      }
      .hero p {
        font-size: 0.85rem;
      }

      .filter-chip {
        padding: 6px 12px;
        font-size: 0.78rem;
      }

      .stories-feed {
        gap: 2rem;
      }
      .story-text {
        font-size: 0.98rem;
        line-height: 1.65;
      }
      .story-meta {
        font-size: 0.78rem;
      }
      .view-count {
        font-size: 0.68rem;
      }

      .story-open-inner {
        margin: 3.5rem auto 2rem;
        padding: 0 0.75rem;
      }
      .open-story-text {
        font-size: 0.98rem;
        line-height: 1.7;
      }
      .memory-image {
        max-height: 180px;
        border-radius: 10px;
      }
      .author-name {
        font-size: 0.9rem;
      }
      .story-nav a {
        font-size: 0.85rem;
      }

      .end-cta p {
        font-size: 1rem;
      }
      .btn-write {
        padding: 11px 28px;
        font-size: 0.88rem;
      }
    }

    /* ─── Very Small (<= 360px) ─── */
    @media (max-width: 360px) {
      .header {
        padding: 0.6rem;
      }
      .nav-links {
        gap: 0.7rem;
      }
      .nav-link,
      .entry-toggle {
        font-size: 0.75rem;
      }
      .hero h1 {
        font-size: 1.25rem;
      }
      .hero p {
        font-size: 0.82rem;
      }
      .story-text {
        font-size: 0.95rem;
      }
      .filter-chip {
        padding: 5px 10px;
        font-size: 0.75rem;
      }
      .open-story-text {
        font-size: 0.95rem;
      }
      .memory-image {
        max-height: 160px;
      }
      .btn-write {
        padding: 10px 24px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <!-- Reading progress bar -->
  <div class="reading-progress" id="readingProgress"></div>

  <!-- Custom cursor dot -->
  <div class="cursor-dot" id="cursorDot"></div>

  <header class="header">
    <nav class="nav-links">
      <span class="nav-link active">Read</span>
      <span class="nav-link" onclick="navigateTo('write')">Write</span>
      <div class="your-entry" id="yourEntry">
        <button class="entry-toggle" onclick="toggleEntry()">Your entry ▾</button>
        <div class="entry-dropdown">
          <div class="entry-heading">Your first entry</div>
          <div class="entry-line">You were the <span class="entry-accent" id="entryNumber">—</span> person here</div>
          <div class="entry-line">You started as: <span class="entry-accent" id="entryIdentity">—</span></div>
          <div class="entry-line">You've read <span class="entry-accent" id="entryReadCount">0</span> stories so far</div>
          <div class="entry-subtle">Your story can be next.</div>
        </div>
      </div>
    </nav>
  </header>

  <!-- Story Open Overlay -->
  <div class="story-open" id="storyOpen" onclick="handleOverlayClick(event)">
    <div class="story-open-inner" onclick="event.stopPropagation()">
      <div id="storyImageContainer"></div>
      <div id="openStoryContent"></div>
    </div>
  </div>

  <main class="page" id="page">
    <section class="hero">
      <h1>How it started for others</h1>
      <p>Every first earning begins differently.</p>
    </section>

    <section class="filter-scroll">
      <button class="filter-chip active" data-filter="all">All</button>
      <button class="filter-chip" data-filter="proud moment">proud moment</button>
      <button class="filter-chip" data-filter="small but meaningful">small but meaningful</button>
      <button class="filter-chip" data-filter="tough beginning">tough beginning</button>
      <button class="filter-chip" data-filter="unexpected start">unexpected start</button>
      <button class="filter-chip" data-filter="first confidence">first confidence</button>
      <button class="filter-chip" data-filter="confusing start">confusing start</button>
      <button class="filter-chip" data-filter="quiet win">quiet win</button>
      <button class="filter-chip" data-filter="turning point">turning point</button>
    </section>

    <section class="stories-feed" id="storiesFeed"></section>

    <section class="end-cta">
      <p>Someone is still at their beginning.</p>
      <button class="btn-write" onclick="navigateTo('write')">Write your story</button>
    </section>
  </main>

  <script>
    const stories = [
      {
        id: 1,
        text: "I still remember holding that \u20B9500 in my hand. It was from a small design project I did for a local shop. The note was crumpled, handed to me with a smile. I kept it in my wallet for months.",
        full: "I still remember holding that \u20B9500 in my hand. It was from a small design project I did for a local shop. The note was crumpled, handed to me with a smile. I kept it in my wallet for months.\n\nI was 19, studying in college, and money was always tight. That project took me three days of back-and-forth, learning as I went. When I finally delivered, the shop owner looked at my work, nodded, and pulled out a worn \u20B9500 note.\n\nIt wasn't about the amount. It was the first time someone paid me for something I created. That feeling\u2014of being valued for your work\u2014never really leaves you.",
        name: "The Beginner",
        category: "Student",
        year: "2019",
        tags: ["proud moment", "small but meaningful"],
        views: 128
      },
      {
        id: 2,

    // Cursor tracking
    let cursorX = 0, cursorY = 0;
    let targetX = 0, targetY = 0;
    const cursorDot = document.getElementById('cursorDot');

    document.addEventListener('mousemove', (e) => {
      targetX = e.clientX;
      targetY = e.clientY;
    });

    function animateCursor() {
      cursorX += (targetX - cursorX) * 0.15;
      cursorY += (targetY - cursorY) * 0.15;
      cursorDot.style.left = cursorX + 'px';
      cursorDot.style.top = cursorY + 'px';
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // Reading progress bar
    const page = document.getElementById('page');
    window.addEventListener('scroll', () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      document.getElementById('readingProgress').style.width = progress + '%';
    });

    // Entry number system
    function getEntryNumber() {
      let entry = localStorage.getItem('firstEarningEntryNumber');
      if (!entry) {
        entry = Math.floor(Math.random() * 300) + 150;
        localStorage.setItem('firstEarningEntryNumber', entry);
        localStorage.setItem('firstEarningFirstVisit', Date.now());
      }
      return parseInt(entry);
    }

    function isReturningVisitor() {
      return localStorage.getItem('firstEarningFirstVisit') !== null &&
             localStorage.getItem('firstEarningReturnShown') !== 'true';
    }

    function markReturnShown() {
      localStorage.setItem('firstEarningReturnShown', 'true');
    }

    function getStoriesRead() {
      const count = localStorage.getItem('firstEarningStoriesRead');
      return count ? parseInt(count) : 0;
    }

    function incrementStoriesRead() {
      const count = getStoriesRead() + 1;
      localStorage.setItem('firstEarningStoriesRead', count);
      return count;
    }

    function loadUserIdentity() {
      const state = sessionStorage.getItem('firstEarningState');
      let identity = '—';
      if (state) {
        const data = JSON.parse(state);
        const name = data.characterName || '';
        const category = data.category || '';
        if (name && category) {
          identity = `${name} \u2022 ${category}`;
        } else if (name) {
          identity = name;
        } else if (category) {
          identity = category;
        }
      }
      return identity;
    }

    // Entry dropdown
    function toggleEntry() {
      document.getElementById('yourEntry').classList.toggle('open');
    }

    document.addEventListener('click', (e) => {
      const entry = document.getElementById('yourEntry');
      if (entry && !entry.contains(e.target)) {
        entry.classList.remove('open');
      }
    });

    // Story open/close
    let currentStoryIndex = 0;
    let filteredStories = [...stories];

    function openStory(id) {
      const story = stories.find(s => s.id === id);
      if (!story) return;

      currentStoryIndex = filteredStories.findIndex(s => s.id === id);
      incrementStoriesRead();
      document.getElementById('entryReadCount').textContent = getStoriesRead();

      const imageHtml = story.image ? `
        <img class="memory-image" src="${story.image}" alt="" onclick="expandImage(this.src)">
        <p class="memory-image-label">From that day</p>
      ` : '';

      const paragraphs = story.full.split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');

      const yearMeta = story.year ? ` &bull; ${story.year}` : '';

      document.getElementById('storyImageContainer').innerHTML = imageHtml;
      document.getElementById('openStoryContent').innerHTML = `
        <div class="open-story-text">${paragraphs}</div>
        <div class="author-block">
          <div class="author-name">${story.name}</div>
          <div class="author-meta">${story.category}${yearMeta}</div>
          <div class="author-views">\u{1F441} ${story.views} views</div>
        </div>
        <div class="story-nav">
          <a onclick="readAnother()">Read another story →</a>
          <a onclick="navigateTo('write')">Write your story →</a>
        </div>
      `;

      document.getElementById('page').classList.add('dimmed');
      const overlay = document.getElementById('storyOpen');
      overlay.style.display = 'flex';
      requestAnimationFrame(() => {
        overlay.classList.add('active');
      });
      document.body.style.overflow = 'hidden';
      window.scrollTo(0, 0);
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('storyOpen')) {
        closeStory();
      }
    }

    function closeStory() {
      document.getElementById('page').classList.remove('dimmed');
      const overlay = document.getElementById('storyOpen');
      overlay.classList.remove('active');
      setTimeout(() => {
        overlay.style.display = 'none';
        document.getElementById('storyImageContainer').innerHTML = '';
        document.getElementById('openStoryContent').innerHTML = '';
      }, 300);
      document.body.style.overflow = '';
    }

    function readAnother() {
      currentStoryIndex = (currentStoryIndex + 1) % filteredStories.length;
      const nextStory = filteredStories[currentStoryIndex];
      if (nextStory) {
        document.getElementById('storyImageContainer').innerHTML = '';
        document.getElementById('openStoryContent').innerHTML = '';

        setTimeout(() => {
          openStory(nextStory.id);
        }, 200);
      }
    }

    function expandImage(src) {
      const img = document.createElement('img');
      img.src = src;
      img.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;object-fit:contain;background:rgba(0,0,0,0.9);z-index:1001;cursor:pointer;border:none;';
      img.onclick = () => document.body.removeChild(img);
      document.body.appendChild(img);
    }

    function renderStories(filter = 'all') {
      const feed = document.getElementById('storiesFeed');
      filteredStories = filter === 'all' ? [...stories] : stories.filter(s => s.tags.includes(filter));

      feed.innerHTML = filteredStories.map(story => {
        const yearMeta = story.year ? ` &bull; ${story.year}` : '';
        return `
        <article class="story-item" onclick="openStory(${story.id})">
          <p class="story-text">${story.text}</p>
          <p class="story-meta">
            <span class="name">${story.name}</span>
            <span class="cat">${story.category}${yearMeta}</span>
          </p>
          <p class="view-count">\u{1F441} ${story.views} views</p>
          <p class="read-more">Read full story →</p>
        </article>
      `;
      }).join('');
    }

    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        renderStories(chip.dataset.filter);
      });
    });

    function navigateTo(page) {
      window.location.href = page + '.html';
    }

    // Init
    const entryNum = getEntryNumber();
    document.getElementById('entryNumber').textContent = entryNum + 'th';
    document.getElementById('entryIdentity').textContent = loadUserIdentity();
    document.getElementById('entryReadCount').textContent = getStoriesRead();

    renderStories();
  </script>
</body>
