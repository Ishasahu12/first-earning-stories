name = "first-earning-stories-api"
main = "src/index.js"
compatibility_date = "2024-05-01"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "first-earning-stories-db"
database_id = "your-database-id-will-go-here"

# R2 Storage for images
[[r2_buckets]]
binding = "STORIES_BUCKET"
bucket_name = "first-earning-stories-images"

# Environment variables
[vars]
ENVIRONMENT = "development"

# Secrets (set via wrangler secret put)
# UPLOAD_TOKEN = "your-secret-upload-token"
